name: Archeon Build

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build ISO in privileged Arch container
        run: |
          docker run --rm --privileged \
            -v ${{ github.workspace }}:/work \
            -w /work \
            archlinux:latest bash -c "chmod +x ./build.sh && ./build.sh"

      - name: Set release info
        id: set_release
        run: |
          echo "title=$(date +'%B %Y')" >> "$GITHUB_OUTPUT"
          echo "tag=$(date +'%B.%Y' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.set_release.outputs.title }}
          tag_name: ${{ steps.set_release.outputs.tag }}
          make_latest: true
          files: out/desktop/*