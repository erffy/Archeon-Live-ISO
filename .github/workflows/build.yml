name: Archeon Build

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build ISO in privileged Arch container
        run: |
          docker run --rm --privileged \
            -v ${{ github.workspace }}:/work \
            -w /work \
            archlinux:latest bash -c "pacman -Syu --needed --noconfirm git archiso squashfs-tools && chmod +x ./build.sh && ./build.sh"

      - name: Set release info
        id: set_release
        run: |
          MONTH=$(date +'%B')
          YEAR=$(date +'%Y')
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TITLE="$MONTH $YEAR (B)"
            TAG="beta.${MONTH,,}.$YEAR"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            TITLE="$MONTH $YEAR"
            TAG="${MONTH,,}.$YEAR"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.set_release.outputs.title }}
          tag_name: ${{ steps.set_release.outputs.tag }}
          make_latest: true
          prerelease: ${{ steps.set_release.outputs.prerelease }}
          files: out/desktop/*